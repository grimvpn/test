<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Интерактивная Карта</title>

    <!-- 1. Подключаем стили Leaflet (Обязательно до скриптов) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
          crossorigin=""/>

    <!-- 2. Подключаем сам скрипт Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" 
            crossorigin=""></script>

    <style>
        /* Убираем стандартные отступы браузера, чтобы карта была на весь экран */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        
        /* Задаем размеры контейнеру карты (обязательно!) */
        #map {
            width: 100%;
            height: 100vh; /* 100vh означает 100% высоты видимого экрана */
        }
    </style>
</head>
<body>

    <!-- 3. Контейнер, в котором будет отрисована карта -->
    <div id="map"></div>

    <script>
        // 4. Инициализация карты
        // Указываем ID контейнера ('map'), координаты центра [Широта, Долгота] и масштаб (13)
        // Сейчас координаты указывают на центр Москвы
        var map = L.map('map').setView([55.751244, 37.618423], 13);

        // 5. Подключаем слой с самими картинками карты (Тайлы)
        // Используем OpenStreetMap - он абсолютно бесплатный и не требует API ключа
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // 6. Ставим маркер на карту
        var marker = L.marker([55.751244, 37.618423]).addTo(map);

        // 7. Добавляем всплывающее окно (попап), которое открывается сразу при загрузке
        marker.bindPopup("<b>Привет!</b><br>Это твоя первая карта на Leaflet.").openPopup();

        // 8. БОНУС: Делаем карту интерактивной!
        // Этот код будет показывать всплывающее окно с координатами того места, куда кликнул пользователь
        var popup = L.popup();

        function onMapClick(e) {
            popup
                .setLatLng(e.latlng)
                .setContent("Вы кликнули по координатам: " + e.latlng.lat.toFixed(5) + ", " + e.latlng.lng.toFixed(5))
                .openOn(map);
        }

        map.on('click', onMapClick);
    </script>

</body>
</html>
