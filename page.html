<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Файлы</title>

<style>
body {
  background:#0d1117;
  color:#c9d1d9;
  font-family:Arial;
  padding:30px;
}

.file {
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #30363d;
}

.file:hover {
  background:#161b22;
}

.left {
  display:flex;
  gap:10px;
  align-items:center;
}

a {
  color:#58a6ff;
  text-decoration:none;
}
</style>
</head>

<body>

<h1>Файлы</h1>
<div id="files">Загрузка...</div>

<script>
const USER = "grimvpn";
const REPO = "test";
const PATH = "";

async function getFileDate(path) {
  try {
    const res = await fetch(
      `https://api.github.com/repos/${USER}/${REPO}/commits?path=${path}&per_page=1`
    );
    const data = await res.json();

    if (!data || !data.length) return new Date(0);

    return new Date(data[0].commit.committer.date);
  } catch {
    return new Date(0);
  }
}

async function loadFiles() {
  const container = document.getElementById("files");

  try {
    const res = await fetch(
      `https://api.github.com/repos/${USER}/${REPO}/contents/${PATH}`
    );

    if (!res.ok) {
      container.innerHTML = "Ошибка API";
      return;
    }

    const data = await res.json();

    const files = data.filter(f => f.type === "file");

    const filesWithDates = await Promise.all(
      files.map(async file => ({
        ...file,
        date: await getFileDate(file.path)
      }))
    );

    filesWithDates.sort((a,b)=>b.date-a.date);

    container.innerHTML = "";

    filesWithDates.forEach(file => {
      const div = document.createElement("div");
      div.className = "file";

      div.innerHTML = `
        <div class="left">
          <img src="file.svg" width="20">
          <a href="${file.download_url}" download>${file.name}</a>
        </div>
        <div>${file.date.toLocaleString()}</div>
      `;

      container.appendChild(div);
    });

  } catch (e) {
    console.error(e);
    container.innerHTML = "Ошибка загрузки";
  }
}

loadFiles();
</script>

</body>
</html>
