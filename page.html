<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Файлы</title>

<style>
body {
  background:#0d1117;
  color:#c9d1d9;
  font-family:Arial;
  padding:30px;
}

.file {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  border-bottom:1px solid #30363d;
}

.file:hover {
  background:#161b22;
}

.left {
  display:flex;
  align-items:center;
  gap:10px;
}

.right {
  display:flex;
  align-items:center;
  gap:10px;
}

a {
  color:#58a6ff;
  text-decoration:none;
}

.icon {
  width:18px;
  cursor:pointer;
  opacity:0.8;
}

.icon:hover {
  opacity:1;
}

.toggle {
  cursor:pointer;
  font-size:12px;
  user-select:none;
  opacity:0.7;
}

.date {
  font-size:12px;
  color:#8b949e;
  display:none;
}
</style>
</head>

<body>

<h1>Файлы</h1>
<div id="files">Загрузка...</div>

<script>
const USER = "grimvpn";
const REPO = "test";
const PATH = "";

async function getFileDate(path) {
  try {
    const res = await fetch(
      `https://api.github.com/repos/${USER}/${REPO}/commits?path=${path}&per_page=1`
    );
    const data = await res.json();

    if (!data || !data.length) return new Date(0);

    return new Date(data[0].commit.committer.date);
  } catch {
    return new Date(0);
  }
}

async function loadFiles() {
  const container = document.getElementById("files");

  try {
    const res = await fetch(
      `https://api.github.com/repos/${USER}/${REPO}/contents/${PATH}`
    );

    const data = await res.json();

    let files = data.filter(f => 
      f.type === "file" &&
      f.name !== "file.svg" &&
      f.name !== "download.svg"
    );

    const filesWithDates = await Promise.all(
      files.map(async file => ({
        ...file,
        date: await getFileDate(file.path)
      }))
    );

    filesWithDates.sort((a,b)=>b.date-a.date);

    container.innerHTML = "";

    filesWithDates.forEach(file => {
      const div = document.createElement("div");
      div.className = "file";

      const dateId = "date-" + Math.random();

      div.innerHTML = `
        <div class="left">
          <span class="toggle" onclick="toggleDate('${dateId}')">▶</span>
          <img src="file.svg" class="icon">
          <a href="${file.download_url}" download>${file.name}</a>
        </div>

        <div class="right">
          <div id="${dateId}" class="date">
            ${file.date.toLocaleString()}
          </div>

          <a href="${file.download_url}" download>
            <img src="download.svg" class="icon">
          </a>
        </div>
      `;

      container.appendChild(div);
    });

  } catch (e) {
    console.error(e);
    container.innerHTML = "Ошибка загрузки";
  }
}

function toggleDate(id) {
  const el = document.getElementById(id);
  const toggle = event.target;

  if (el.style.display === "none") {
    el.style.display = "block";
    toggle.textContent = "▼";
  } else {
    el.style.display = "none";
    toggle.textContent = "▶";
  }
}

loadFiles();
</script>

</body>
</html>
