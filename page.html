<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Файлы</title>

<style>
body {
  background:#0d1117;
  color:#c9d1d9;
  font-family:Arial;
  padding:30px;
  font-size:18px;
}

h1 { margin-bottom:10px; }

.topbar {
  margin-bottom:15px;
}

input {
  width:100%;
  background:#161b22;
  border:1px solid #30363d;
  color:#c9d1d9;
  padding:10px;
  border-radius:6px;
}

.nav {
  margin:10px 0;
  color:#8b949e;
  cursor:pointer;
}

.item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  border-bottom:1px solid #30363d;
  cursor:pointer;
}

.item:hover {
  background:#161b22;
}

.left {
  display:flex;
  align-items:center;
  gap:10px;
}

.icon { width:20px; }

.actions {
  display:flex;
  gap:10px;
  align-items:center;
}

.btn {
  width:26px;
  cursor:pointer;
  opacity:0.85;
}

.btn:hover { opacity:1; }

.date {
  font-size:14px;
  color:#8b949e;
}
</style>
</head>

<body>

<h1>Файловый менеджер</h1>

<div class="topbar">
  <input id="search" placeholder="Поиск...">
</div>

<div class="nav" id="path"></div>

<div id="files">Загрузка...</div>

<script>
const USER = "grimvpn";
const REPO = "test";

/* 🔑 токен только тут */
const GITHUB_TOKEN = "";

let currentPath = "";

function api(url) {
  const headers = {};
  if (GITHUB_TOKEN) {
    headers["Authorization"] = "Bearer " + GITHUB_TOKEN;
  }
  return fetch(url, { headers });
}

function updatePathUI() {
  document.getElementById("path").innerText =
    "📁 /" + (currentPath || "");
}

function goBack() {
  const parts = currentPath.split("/").filter(Boolean);
  parts.pop();
  currentPath = parts.join("/");
  load();
}

async function downloadFile(url, name) {
  const res = await fetch(url);
  const blob = await res.blob();

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

function viewFile(url) {
  window.open(url, "_blank");
}

function openFolder(name) {
  currentPath = currentPath ? currentPath + "/" + name : name;
  load();
}

let allItems = [];

function render(items) {
  const container = document.getElementById("files");
  container.innerHTML = "";

  // 🔙 назад
  if (currentPath) {
    const back = document.createElement("div");
    back.className = "item";
    back.innerHTML = `<div class="left">⬅ Назад</div>`;
    back.onclick = goBack;
    container.appendChild(back);
  }

  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";

    if (item.type === "dir") {
      div.innerHTML = `
        <div class="left">
          📁 ${item.name}
        </div>
      `;
      div.onclick = () => openFolder(item.name);
    }

    else {
      div.innerHTML = `
        <div class="left">
          📄 ${item.name}
        </div>

        <div class="actions">
          <img class="btn" src="view.svg"
               onclick="event.stopPropagation();viewFile('${item.download_url}')">

          <img class="btn" src="download.svg"
               onclick="event.stopPropagation();downloadFile('${item.download_url}','${item.name}')">
        </div>
      `;
    }

    container.appendChild(div);
  });
}

/* 🔍 live search */
document.getElementById("search").addEventListener("input", () => {
  const q = document.getElementById("search").value.toLowerCase();

  const filtered = allItems.filter(i =>
    i.name.toLowerCase().includes(q)
  );

  render(filtered);
});

async function load() {
  const url = `https://api.github.com/repos/${USER}/${REPO}/contents/${currentPath}`;

  const res = await api(url);
  const data = await res.json();

  allItems = data;
  updatePathUI();
  render(allItems);
}

load();
</script>

</body>
</html>
