<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Файлы</title>

<style>
body {
  background:#0d1117;
  color:#c9d1d9;
  font-family:Arial;
  padding:30px;
  font-size:18px;
}

.file {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  border-bottom:1px solid #30363d;
}

.file:hover {
  background:#161b22;
}

.left {
  display:flex;
  align-items:center;
  gap:12px;
}

.right {
  display:flex;
  align-items:center;
  gap:12px;
}

a {
  color:#58a6ff;
  text-decoration:none;
  font-size:18px;
}

.icon {
  width:20px;
}

.download {
  width:28px;
  cursor:pointer;
  opacity:0.85;
}

.download:hover {
  opacity:1;
}

.toggle {
  cursor:pointer;
  font-size:18px;
  user-select:none;
  opacity:0.7;
}

.date {
  font-size:14px;
  color:#8b949e;
  display:none;
}

.date.open {
  display:block;
}
</style>
</head>

<body>

<h1>Файлы</h1>
<div id="files">Загрузка...</div>

<script>
const USER = "grimvpn";
const REPO = "test";
const PATH = "";

async function getFileDate(path) {
  try {
    const res = await fetch(
      `https://api.github.com/repos/${USER}/${REPO}/commits?path=${path}&per_page=1`
    );
    const data = await res.json();
    if (!data || !data.length) return new Date(0);
    return new Date(data[0].commit.committer.date);
  } catch {
    return new Date(0);
  }
}

// ✅ скачивание файла (а не открытие)
async function downloadFile(url, name) {
  const res = await fetch(url);
  const blob = await res.blob();

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = name;
  document.body.appendChild(link);
  link.click();
  link.remove();
}

async function loadFiles() {
  const container = document.getElementById("files");

  try {
    const res = await fetch(
      `https://api.github.com/repos/${USER}/${REPO}/contents/${PATH}`
    );

    const data = await res.json();

    let files = data.filter(f =>
      f.type === "file" &&
      f.name !== "file.svg" &&
      f.name !== "download.svg"
    );

    const filesWithDates = await Promise.all(
      files.map(async file => ({
        ...file,
        date: await getFileDate(file.path)
      }))
    );

    filesWithDates.sort((a,b)=>b.date-a.date);

    container.innerHTML = "";

    filesWithDates.forEach(file => {
      const div = document.createElement("div");
      div.className = "file";

      const id = "d" + Math.random();

      div.innerHTML = `
        <div class="left">
          <img src="file.svg" class="icon">

          <a href="#" onclick="downloadFile('${file.download_url}','${file.name}');return false;">
            ${file.name}
          </a>

          <img src="download.svg" class="download"
               onclick="downloadFile('${file.download_url}','${file.name}')">
        </div>

        <div class="right">
          <div id="${id}" class="date">
            ${file.date.toLocaleString()}
          </div>

          <span class="toggle" onclick="toggleDate('${id}', this)">▶</span>
        </div>
      `;

      container.appendChild(div);
    });

  } catch (e) {
    console.error(e);
    container.innerHTML = "Ошибка загрузки";
  }
}

// ✅ исправленный toggle (без бага)
function toggleDate(id, el) {
  const d = document.getElementById(id);

  d.classList.toggle("open");

  if (d.classList.contains("open")) {
    el.textContent = "▼";
  } else {
    el.textContent = "▶";
  }
}

loadFiles();
</script>

</body>
</html>
