<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Файлы</title>

  <style>
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .file {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      border-bottom: 1px solid #30363d;
      transition: 0.2s;
    }

    .file:hover {
      background: #161b22;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    img {
      width: 20px;
    }

    a {
      color: #58a6ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .date {
      font-size: 12px;
      color: #8b949e;
    }
  </style>
</head>

<body>

<h1>Файлы</h1>
<div id="files">Загрузка...</div>

<script>
  const USER = "grimvpn";
  const REPO = "vpn";
  const PATH = "files"; // например "files"

  async function getFileDate(path) {
    const res = await fetch(
      `https://api.github.com/repos/${USER}/${REPO}/commits?path=${path}&per_page=1`
    );
    const data = await res.json();
    return new Date(data[0].commit.committer.date);
  }

  async function loadFiles() {
    const container = document.getElementById("files");
    container.innerHTML = "Загрузка...";

    try {
      const res = await fetch(
        `https://api.github.com/repos/${USER}/${REPO}/contents/${PATH}`
      );
      const data = await res.json();

      const files = data.filter(item => item.type === "file");

      const filesWithDates = await Promise.all(
        files.map(async file => ({
          ...file,
          date: await getFileDate(file.path)
        }))
      );

      filesWithDates.sort((a, b) => b.date - a.date);

      container.innerHTML = "";

      for (const file of filesWithDates) {
        const div = document.createElement("div");
        div.className = "file";

        const formattedDate = file.date.toLocaleString();

        div.innerHTML = `
          <div class="left">
            <img src="file.svg">
            <a href="${file.download_url}" download>${file.name}</a>
          </div>
          <div class="date">${formattedDate}</div>
        `;

        container.appendChild(div);
      }

      if (filesWithDates.length === 0) {
        container.innerHTML = "Нет файлов";
      }

    } catch (e) {
      container.innerHTML = "Ошибка загрузки";
      console.error(e);
    }
  }

  loadFiles();
</script>

</body>
</html>
