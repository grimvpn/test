<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кастомная Змейка</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            /* Убираем выделение текста при тапах на телефоне */
            user-select: none; 
            -webkit-user-select: none;
        }
        h1 {
            margin-top: 10px;
            color: #4CAF50;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            font-size: 24px;
            text-align: center;
        }
        .container {
            display: flex;
            flex-direction: row;
            gap: 20px;
            background: #2a2a40;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 100%;
            box-sizing: border-box;
        }
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            width: 100%;
            max-width: 400px;
        }
        .score-board {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        /* Адаптивный холст */
        canvas {
            background-color: #000;
            border: 4px solid #4CAF50;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.3);
            width: 100%;
            aspect-ratio: 1 / 1; /* Сохраняем квадратные пропорции */
            touch-action: none; /* Запрещаем скролл при свайпах по холсту */
        }
        .settings-panel {
            background: #32324e;
            padding: 20px;
            border-radius: 10px;
            width: 250px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-sizing: border-box;
        }
        .settings-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .settings-group.row {
            flex-direction: row;
            align-items: center;
            gap: 10px;
        }
        label {
            font-size: 14px;
            color: #ccc;
        }
        input[type="number"], select {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #555;
            background: #1e1e2f;
            color: white;
            outline: none;
        }
        input[type="color"] {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: transparent;
        }
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        button {
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            margin-top: 5px;
        }
        button:hover { background-color: #45a049; }
        button:active { transform: scale(0.98); }
        
        .overlay {
            position: absolute;
            top: 40px;
            left: 0;
            width: 100%;
            height: calc(100% - 40px);
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 5px;
            display: none;
            text-align: center;
            z-index: 10;
        }
        .overlay h2 { font-size: 28px; margin: 0 0 15px 0; }
        .overlay p { font-size: 18px; margin: 0 0 20px 0; }
        .win-text { color: #FFD700; }
        .lose-text { color: #FF5252; }

        /* Стили Джойстика */
        .joystick-container {
            display: none; /* Скрыт по умолчанию */
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
            touch-action: manipulation; /* Улучшает отклик на мобилках */
        }
        .joy-btn {
            background: rgba(76, 175, 80, 0.2);
            border: 2px solid #4CAF50;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            color: white;
        }
        .joy-btn:active {
            background: #4CAF50;
            transform: scale(0.95);
        }
        .joy-empty { background: transparent; border: none; }

        /* Адаптивность для мобильных устройств */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                align-items: center;
                padding: 10px;
            }
            .settings-panel {
                width: 100%;
                max-width: 400px;
            }
            .joystick-container {
                grid-template-columns: repeat(3, 70px);
                grid-template-rows: repeat(3, 70px);
            }
        }
    </style>
</head>
<body>

    <h1>🐍 Кастомная Змейка 🐍</h1>

    <div class="container">
        <!-- Игровое поле -->
        <div class="game-area">
            <div class="score-board">
                <span>Счет: <span id="scoreDisplay">0</span></span>
                <span>Цель: <span id="targetDisplay">Бесконечно</span></span>
            </div>
            <!-- Фиксированный размер холста, масштабируется через CSS -->
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <!-- Джойстик -->
            <div id="joystickControls" class="joystick-container">
                <div class="joy-empty"></div>
                <div class="joy-btn" onpointerdown="handleJoy('up')">⬆️</div>
                <div class="joy-empty"></div>
                <div class="joy-btn" onpointerdown="handleJoy('left')">⬅️</div>
                <div class="joy-empty"></div>
                <div class="joy-btn" onpointerdown="handleJoy('right')">➡️</div>
                <div class="joy-empty"></div>
                <div class="joy-btn" onpointerdown="handleJoy('down')">⬇️</div>
                <div class="joy-empty"></div>
            </div>

            <!-- Окно конца игры -->
            <div id="gameOverOverlay" class="overlay">
                <h2 id="endMessage">Игра окончена!</h2>
                <p>Ваш счет: <span id="finalScore">0</span></p>
                <button onclick="startGame()">Играть снова</button>
            </div>
        </div>

        <!-- Панель настроек -->
        <div class="settings-panel">
            <h3>Настройки игры</h3>
            
            <div class="settings-group">
                <label for="winScore">Счет для победы (пусто = бесконечно):</label>
                <input type="number" id="winScore" placeholder="Например: 20" min="1" max="999">
            </div>

            <div class="settings-group row">
                <input type="checkbox" id="useJoystick" onchange="toggleJoystick()">
                <label for="useJoystick">Включить джойстик</label>
            </div>

            <div class="settings-group">
                <label for="difficulty">Сложность (Скорость):</label>
                <select id="difficulty">
                    <option value="150">Легко</option>
                    <option value="100" selected>Нормально</option>
                    <option value="60">Сложно</option>
                    <option value="40">Безумие</option>
                </select>
            </div>

            <div class="settings-group">
                <label for="snakeColor">Цвет змейки:</label>
                <input type="color" id="snakeColor" value="#4CAF50">
            </div>

            <div class="settings-group">
                <label for="foodColor">Цвет еды:</label>
                <input type="color" id="foodColor" value="#FF5252">
            </div>
            
            <div class="settings-group">
                <label for="gridColor">Цвет сетки (черный = выкл):</label>
                <input type="color" id="gridColor" value="#000000">
            </div>

            <button id="startBtn" onclick="startGame()">Начать игру</button>
        </div>
    </div>

    <!-- Аудио файлы -->
    <audio id="soundGameOver" src="gameover.mp4"></audio>
    <audio id="soundVictory" src="victori.mp4"></audio>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        // Звуки
        const soundGameOver = document.getElementById("soundGameOver");
        const soundVictory = document.getElementById("soundVictory");

        // Элементы UI
        const scoreDisplay = document.getElementById("scoreDisplay");
        const targetDisplay = document.getElementById("targetDisplay");
        const overlay = document.getElementById("gameOverOverlay");
        const endMessage = document.getElementById("endMessage");
        const finalScore = document.getElementById("finalScore");
        const joystickContainer = document.getElementById("joystickControls");

        // Настройки из UI
        let winScoreLimit = Infinity;
        let speed = 100;
        let snakeColor = "#4CAF50";
        let foodColor = "#FF5252";
        let gridColor = "#000000";

        // Игровые переменные
        const tileSize = 20;
        const tileCount = canvas.width / tileSize; // 400 / 20 = 20
        let snake = [];
        let dx = 0;
        let dy = 0;
        let foodX = 0;
        let foodY = 0;
        let score = 0;
        let gameInterval;
        let changingDirection = false;
        let isGameRunning = false;

        // Управление с клавиатуры
        document.addEventListener("keydown", changeDirection);

        // Функция показа/скрытия джойстика
        function toggleJoystick() {
            const isChecked = document.getElementById("useJoystick").checked;
            joystickContainer.style.display = isChecked ? "grid" : "none";
        }

        // Применяем настройки перед стартом
        function applySettings() {
            const scoreInput = document.getElementById("winScore").value;
            // Если поле пустое или не число, ставим Infinity (бесконечность)
            winScoreLimit = (scoreInput && scoreInput > 0) ? parseInt(scoreInput) : Infinity;
            
            speed = parseInt(document.getElementById("difficulty").value);
            snakeColor = document.getElementById("snakeColor").value;
            foodColor = document.getElementById("foodColor").value;
            gridColor = document.getElementById("gridColor").value;
            
            targetDisplay.innerText = (winScoreLimit === Infinity) ? "Бесконечно" : winScoreLimit;
        }

        function startGame() {
            applySettings();
            
            // Остановка звуков
            soundGameOver.pause();
            soundGameOver.currentTime = 0;
            soundVictory.pause();
            soundVictory.currentTime = 0;

            // Сброс состояния
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1;
            dy = 0;
            score = 0;
            scoreDisplay.innerText = score;
            isGameRunning = true;
            overlay.style.display = "none";
            
            spawnFood();
            
            clearInterval(gameInterval);
            gameInterval = setInterval(mainLoop, speed);
        }

        function mainLoop() {
            if (!isGameRunning) return;
            
            changingDirection = false;
            
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            
            // Проверка на проигрыш
            if (isCollision(head)) {
                endGame(false);
                return;
            }
            
            snake.unshift(head);
            
            // Еда съедена
            if (head.x === foodX && head.y === foodY) {
                score++;
                scoreDisplay.innerText = score;
                
                // Проверка на победу (если не бесконечный режим)
                if (score >= winScoreLimit) {
                    endGame(true);
                    return;
                }
                
                spawnFood();
            } else {
                snake.pop();
            }
            
            draw();
        }

        function isCollision(head) {
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) return true;
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) return true;
            }
            return false;
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gridColor !== "#000000" && gridColor !== "#000") {
                ctx.strokeStyle = gridColor;
                ctx.lineWidth = 0.5;
                for (let i = 0; i < tileCount; i++) {
                    ctx.beginPath(); ctx.moveTo(i * tileSize, 0); ctx.lineTo(i * tileSize, canvas.height); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0, i * tileSize); ctx.lineTo(canvas.width, i * tileSize); ctx.stroke();
                }
            }

            ctx.fillStyle = foodColor;
            ctx.beginPath();
            ctx.arc(foodX * tileSize + tileSize / 2, foodY * tileSize + tileSize / 2, tileSize / 2.2, 0, 2 * Math.PI);
            ctx.fill();

            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? shadeColor(snakeColor, -20) : snakeColor;
                ctx.fillRect(part.x * tileSize, part.y * tileSize, tileSize - 1, tileSize - 1);
            });
        }

        function spawnFood() {
            let foodIsOnSnake = true;
            while (foodIsOnSnake) {
                foodX = Math.floor(Math.random() * tileCount);
                foodY = Math.floor(Math.random() * tileCount);
                foodIsOnSnake = snake.some(part => part.x === foodX && part.y === foodY);
            }
        }

        // Общая логика смены направления
        function setDirection(newDx, newDy) {
            if (changingDirection || !isGameRunning) return;
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if (newDx === -1 && !goingRight) { dx = -1; dy = 0; changingDirection = true; }
            if (newDx === 1 && !goingLeft)   { dx = 1; dy = 0; changingDirection = true; }
            if (newDy === -1 && !goingDown)  { dx = 0; dy = -1; changingDirection = true; }
            if (newDy === 1 && !goingUp)     { dx = 0; dy = 1; changingDirection = true; }
        }

        // Обработка клавиатуры
        function changeDirection(event) {
            const key = event.key.toLowerCase();
            if (key === "arrowleft" || key === "a" || key === "ф") setDirection(-1, 0);
            if (key === "arrowright" || key === "d" || key === "в") setDirection(1, 0);
            if (key === "arrowup" || key === "w" || key === "ц") setDirection(0, -1);
            if (key === "arrowdown" || key === "s" || key === "ы") setDirection(0, 1);
        }

        // Обработка кликов/тапов по джойстику
        function handleJoy(dir) {
            if (dir === 'left') setDirection(-1, 0);
            if (dir === 'right') setDirection(1, 0);
            if (dir === 'up') setDirection(0, -1);
            if (dir === 'down') setDirection(0, 1);
        }

        function endGame(isWin) {
            clearInterval(gameInterval);
            isGameRunning = false;
            
            overlay.style.display = "flex";
            finalScore.innerText = score;

            if (isWin) {
                endMessage.innerText = "🏆 ВЫ ПОБЕДИЛИ! 🏆";
                endMessage.className = "win-text";
                soundVictory.play().catch(e => console.log("Браузер заблокировал звук", e));
            } else {
                endMessage.innerText = "💀 Вы проиграли! 💀";
                endMessage.className = "lose-text";
                soundGameOver.play().catch(e => console.log("Браузер заблокировал звук", e));
            }
        }

        function shadeColor(color, percent) {
            let R = parseInt(color.substring(1,3),16);
            let G = parseInt(color.substring(3,5),16);
            let B = parseInt(color.substring(5,7),16);

            R = parseInt(R * (100 + percent) / 100);
            G = parseInt(G * (100 + percent) / 100);
            B = parseInt(B * (100 + percent) / 100);

            R = (R<255)?R:255; G = (G<255)?G:255; B = (B<255)?B:255;  

            const RR = ((R.toString(16).length==1)?"0"+R.toString(16):R.toString(16));
            const GG = ((G.toString(16).length==1)?"0"+G.toString(16):G.toString(16));
            const BB = ((B.toString(16).length==1)?"0"+B.toString(16):B.toString(16));

            return "#"+RR+GG+BB;
        }

        applySettings();
        toggleJoystick();
        draw();
    </script>
</body>
</html>
