<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bytebeat Professional Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #080808; color: #00ff41; font-family: 'Courier New', Courier, monospace; }
        .neon-border { border: 1px solid #00ff41; box-shadow: 0 0 15px rgba(0, 255, 65, 0.15); }
        textarea { background: #000; color: #00ff41; resize: none; border: 1px solid #1a1a1a; }
        textarea:focus { border-color: #00ff41; outline: none; }
        
        .btn { 
            border: 1px solid #00ff41; 
            padding: 6px 12px; 
            cursor: pointer; 
            transition: all 0.2s; 
            background: transparent;
            color: #00ff41;
            text-transform: uppercase;
            font-weight: bold;
        }
        .btn:hover { 
            background: #00ff41; 
            color: #000 !important;
        }
        
        .preset-card { border-bottom: 1px solid #151515; padding: 8px; cursor: pointer; }
        .preset-card:hover { background: #111; }
        select { background: #000; border: 1px solid #00ff41; color: #00ff41; outline: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #00ff41; }
    </style>
</head>
<body class="p-4 flex flex-col h-screen overflow-hidden">

    <div class="max-w-7xl mx-auto w-full h-full flex flex-col gap-4">
        <div class="flex flex-col md:flex-row gap-4 h-52 shrink-0">
            <div class="flex-grow flex flex-col bg-black neon-border overflow-hidden relative">
                <canvas id="vizCanvas" class="w-full h-full"></canvas>
                <div class="absolute top-2 left-2 text-[10px] bg-black/80 px-1 uppercase tracking-tighter border border-zinc-800">
                    Visualizer: <span id="vizModeLabel">FFT</span>
                </div>
            </div>
            <div class="w-full md:w-72 flex flex-col gap-3 p-4 bg-[#0c0c0c] border border-zinc-800">
                <label class="text-[10px] uppercase opacity-50 tracking-widest">Master Volume</label>
                <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5" class="w-full accent-[#00ff41] cursor-pointer">
                
                <div class="grid grid-cols-2 gap-3 mt-2">
                    <button id="toggleBtn" class="btn">Start</button>
                    <button id="resetBtn" class="btn">Reset T</button>
                </div>
                
                <div class="mt-auto text-[10px] opacity-40 leading-relaxed">
                    GrimBytebeat v2.0<br>
                    Status: <span id="status" class="text-white">Ready</span><br>
                    T Value: <span id="tDisplay" class="text-white">0</span>
                </div>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-4 flex-grow overflow-hidden">
            <div class="flex-[2] flex flex-col gap-4 overflow-y-auto pr-2">
                <div class="flex flex-wrap gap-4 items-end bg-[#0c0c0c] p-3 border border-zinc-800">
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] uppercase opacity-50">Audio Mode</label>
                        <select id="mode" class="text-xs p-1">
                            <option value="bytebeat">Bytebeat</option>
                            <option value="signed">Signed Bytebeat</option>
                            <option value="floatbeat">Floatbeat</option>
                            <option value="funcbeat">Funcbeat</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] uppercase opacity-50">Sample Rate</label>
                        <select id="sampleRate" class="text-xs p-1">
                            <option value="8000" selected>8000 Hz</option>
                            <option value="11025">11025 Hz</option>
                            <option value="16000">16000 Hz</option>
                            <option value="22050">22050 Hz</option>
                            <option value="32000">32000 Hz</option>
                            <option value="44100">44100 Hz</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] uppercase opacity-50">Viz Type</label>
                        <select id="vizMode" class="text-xs p-1">
                            <option value="fft">FFT</option>
                            <option value="wave">Waveform</option>
                            <option value="points">Points</option>
                            <option value="diagram">Diagram</option>
                            <option value="combined">Combined</option>
                        </select>
                    </div>
                </div>

                <div class="flex flex-col flex-grow min-h-[200px]">
                    <label class="text-[10px] uppercase mb-1 opacity-50 tracking-widest italic">Code Editor</label>
                    <textarea id="formula" class="w-full h-full p-4 font-mono text-xl" spellcheck="false">t*((t&4096?t%65536<59392?7:t&7:16)+(1&t>>14))>>(3&-t>>(t&2048?2:10))|t>>(t&16384?t&4096?10:3:2)</textarea>
                </div>
                <div id="errorLog" class="text-red-500 text-[10px] font-bold h-4"></div>
            </div>

            <div class="flex-1 flex flex-col gap-2 overflow-hidden border-l border-zinc-900 pl-4">
                <label class="text-[10px] uppercase opacity-50 sticky top-0 bg-[#080808] z-10 py-1 tracking-widest border-b border-zinc-800 mb-2">Preset Library</label>
                <div id="presetList" class="overflow-y-auto flex-grow pr-2"></div>
            </div>
        </div>
    </div>

    <script>
        const PRESETS = [
            { name: "link", code: "t+(t&t^t>>6)-t*(t>>9&(t%16?2:6)&t>>9)", mode: "bytebeat" },
            { name: "the 42 melody", code: "t*(42&t>>10)", mode: "bytebeat" },
            { name: "Awesome level", code: "t*(t&16384?6:5)*(3+(3&t>>(t&2048?7:14)))>>(3&t>>9)|t>>2", mode: "bytebeat" },
            { name: "Awesome level with slower rhythm", code: "t*(t&16384?6:5)*(3+(3&t>>(t&2048?7:14)))>>(3&t>>9)|t>>3", mode: "bytebeat" },
            { name: "Alien dungeon", code: "t*(t&16384?7:5)*(3+(3&t>>14))>>(3&t>>9)|t>>6", mode: "bytebeat" },
            { name: "Awesome level #2", code: "t*(t&16384?6:5)*(5-(3&t>>(t&4096?7:14)))>>(3&t>>9)|t>>3", mode: "bytebeat" },
            { name: "Boss level #6", code: "t*((t&4096?6:16)+(1&t>>14))>>(3&t>>8)|t>>(t&4096?3:4)", mode: "bytebeat" },
            { name: "Neurofunk", code: "t*((t&4096?t%65536<59392?7:t&7:16)+(1&t>>14))>>(3&-t>>(t&2048?2:10))|t>>(t&16384?t&4096?10:3:2)", mode: "bytebeat" },
            { name: "42 melody with adjustable decay", code: "t*(42&t>>10)%256*(1-t%2048/3000)", mode: "bytebeat" },
            { name: "minimal sierpinski harmony", code: "t&t>>8", mode: "bytebeat" },
            { name: "link2", code: "t*((t>>12|t>>8)&63&t>>4)", mode: "bytebeat" },
            { name: "Sin() isn't kosher, people!", code: "10*(t>>6|t|t>>(t>>16))+(7&t>>11)", mode: "bytebeat" },
            { name: "Combined xpansive's and varjohukka's stuff", code: "(t>>7|t|t>>6)*10+4*(t&t>>13|t>>6)", mode: "bytebeat" },
            { name: "Another attempt at melody construction", code: "t*(3+(1^t>>10&5))*(5+(3&t>>14))>>(t>>8&3)", mode: "bytebeat" },
            { name: "moon scanner generalization", code: "2*(t>>5&t)-(t>>5)+t*(t>>14&14)", mode: "bytebeat" },
            { name: "Long Sierpinski Harmony", code: "5*t&t>>7|3*t&t>>10", mode: "bytebeat" },
            { name: "Noisy beats", code: "((-t&4095)*(255&t*(t&t>>13))>>12)+(127&t*(234&t>>8&t>>3)>>(3&t>>14))", mode: "bytebeat" },
            { name: "Bassline #countercomplex", code: "(~t>>2)*((127&t*(7&t>>10))<(245&t*(2+(5&t>>14))))", mode: "bytebeat" },
            { name: "link (division logic)", code: "t%(t/(t>>9|t>>13))", mode: "bytebeat" },
            { name: "Combination (Fanfare? + Street Surfer)", code: "(t&4096?(t*(t^t%255)|t>>4)>>1:t>>3|(t&8192?t<<2:t))^((t&8192?t&4096?t&1024?2*t:4*t:t&512?4*t:4.2*t:(t&4096?t&1024?2*t:10*t:t&512?2*t:8*t)>>2)*(t&16384?3:2)|t*(t&16384?1/8:1/(.01*t))>>1)", mode: "bytebeat" },
            { name: "link (shifting logic)", code: "t/3>>t%40+5|t/(24+t&3)>>t%(15-(t>>15)%8*6)+5", mode: "bytebeat" },
            { name: "a quite complex one using conditionals", code: "10*(t&5*t|t>>6|(t&32768?-6*t/7:(t&65536?-9*t&100:-9*(t&100))/11))", mode: "bytebeat" },
            { name: "link1", code: "t*(t^t+(t>>15|1)^(t-1280^t)>>10)", mode: "bytebeat" },
            { name: "Frere Jacques", code: "10*(t>>7|3*t|t>>(t>>15))+(t>>8&5)", mode: "bytebeat" },
            { name: "generic 3/4 buildup", code: "t&598?t>>4:t>>10", mode: "bytebeat" },
            { name: "music for a C64 game", code: "t*(t>>(t&4096?t*t>>12:t>>12))|t<<(t>>8)|t>>4", mode: "bytebeat" },
            { name: "link (nested shifts)", code: "t*(t>>9&10|t>>11&24^t>>10&15&t>>15)", mode: "bytebeat" },
            { name: "Modem melody", code: "(t&t>>12)*(t>>4|t>>8)", mode: "bytebeat" },
            { name: "link (quadratic)", code: "20*t*t*(t>>11)/7", mode: "bytebeat" },
            { name: "ONE MILLION alarm clocks", code: "t*t/(t>>12&t>>8)<<7", mode: "bytebeat" },
            { name: "bare-bones version", code: "t>>4|t*t*(t>>6&8^8)*(t>>11^t/3>>12)/(7+(t>>10&t>>14&3))", mode: "bytebeat" }
        ];

        let audioCtx = null;
        let workletNode = null;
        let gainNode = null;
        let analyser = null;
        let isPlaying = false;
        let tValue = 0;

        const canvas = document.getElementById('vizCanvas');
        const ctx = canvas.getContext('2d');
        const formulaInput = document.getElementById('formula');
        const modeSelect = document.getElementById('mode');
        const sampleRateSelect = document.getElementById('sampleRate');
        const volumeInput = document.getElementById('volume');
        const toggleBtn = document.getElementById('toggleBtn');
        const resetBtn = document.getElementById('resetBtn');
        const presetList = document.getElementById('presetList');
        const errorLog = document.getElementById('errorLog');
        const statusLabel = document.getElementById('status');
        const vizModeSelect = document.getElementById('vizMode');
        const tDisplay = document.getElementById('tDisplay');

        const workletCode = `
            class BytebeatProcessor extends AudioWorkletProcessor {
                constructor() {
                    super();
                    this.t = 0;
                    this.formula = (t) => 0;
                    this.mode = 'bytebeat';
                    this.targetHz = 8000;
                    this.hostHz = 44100;
                    this.phase = 0;
                    this.lastValue = 0;

                    this.port.onmessage = (e) => {
                        if (e.data.type === 'update') {
                            try { 
                                if(e.data.mode === 'funcbeat') {
                                    this.formula = new Function('t', e.data.code);
                                } else {
                                    this.formula = new Function('t', 'return ' + e.data.code); 
                                }
                            } catch(err) {}
                            this.mode = e.data.mode;
                            this.targetHz = e.data.sampleRate;
                        }
                        if (e.data.type === 'reset') this.t = 0;
                        if (e.data.type === 'init') this.hostHz = e.data.hostHz;
                    };
                }

                process(inputs, outputs) {
                    const output = outputs[0][0];
                    const ratio = this.targetHz / this.hostHz;

                    for (let i = 0; i < output.length; i++) {
                        this.phase += ratio;
                        if (this.phase >= 1) {
                            this.phase -= Math.floor(this.phase);
                            this.t++;
                            if(i === 0) this.port.postMessage({t: this.t});
                            try {
                                let val = this.formula(this.t);
                                if (this.mode === 'floatbeat') {
                                    this.lastValue = Math.max(-1, Math.min(1, val));
                                } else if (this.mode === 'signed') {
                                    let b = (val & 255);
                                    if (b > 127) b -= 256;
                                    this.lastValue = b / 128.0;
                                } else {
                                    this.lastValue = ((val & 255) / 127.5) - 1.0;
                                }
                            } catch(e) { this.lastValue = 0; }
                        }
                        output[i] = this.lastValue;
                    }
                    return true;
                }
            }
            registerProcessor('bytebeat-processor', BytebeatProcessor);
        `;

        async function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            const blob = new Blob([workletCode], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            await audioCtx.audioWorklet.addModule(url);

            workletNode = new AudioWorkletNode(audioCtx, 'bytebeat-processor');
            workletNode.port.postMessage({ type: 'init', hostHz: audioCtx.sampleRate });
            
            workletNode.port.onmessage = (e) => {
                if(e.data.t) tDisplay.textContent = e.data.t;
            };

            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            
            gainNode = audioCtx.createGain();
            gainNode.gain.value = volumeInput.value;

            workletNode.connect(analyser);
            analyser.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            updateEngine();
        }

        function updateEngine() {
            if (!workletNode) return;
            errorLog.textContent = "";
            try {
                let code = formulaInput.value;
                if(modeSelect.value === 'funcbeat') {
                    new Function('t', code);
                } else {
                    new Function('t', 'return ' + code);
                }
                
                workletNode.port.postMessage({
                    type: 'update',
                    code: code,
                    mode: modeSelect.value,
                    sampleRate: parseInt(sampleRateSelect.value)
                });
            } catch (e) {
                errorLog.textContent = "SYNTAX_ERROR: " + e.message;
            }
        }

        function draw() {
            requestAnimationFrame(draw);
            if (!ctx || !analyser) return;

            const mode = vizModeSelect.value;
            const w = canvas.width;
            const h = canvas.height;

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, w, h);

            if (mode === 'fft' || mode === 'combined') {
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                analyser.getByteFrequencyData(dataArray);

                const barWidth = (w / bufferLength) * 2.5;
                let x = 0;
                for (let i = 0; i < bufferLength; i++) {
                    const barHeight = (dataArray[i] / 255) * h;
                    ctx.fillStyle = `rgb(0, ${dataArray[i] + 100}, 65)`;
                    ctx.fillRect(x, h - barHeight, barWidth - 1, barHeight);
                    x += barWidth;
                }
            }

            if (mode === 'wave' || mode === 'combined' || mode === 'points' || mode === 'diagram') {
                const bufferLength = analyser.fftSize;
                const dataArray = new Uint8Array(bufferLength);
                analyser.getByteTimeDomainData(dataArray);

                ctx.lineWidth = 2;
                ctx.strokeStyle = '#00ff41';
                if(mode === 'combined') ctx.strokeStyle = '#ffffff';
                
                if(mode === 'points') {
                    for(let i=0; i<bufferLength; i++) {
                        const v = dataArray[i] / 128.0;
                        const y = v * h / 2;
                        const x = i * (w/bufferLength);
                        ctx.fillRect(x, y, 2, 2);
                    }
                } else if(mode === 'diagram') {
                    for(let i=0; i<bufferLength; i+=4) {
                        const v = dataArray[i] / 128.0;
                        const y = v * h / 2;
                        const x = i * (w/bufferLength);
                        ctx.beginPath();
                        ctx.moveTo(x, h/2);
                        ctx.lineTo(x, y);
                        ctx.stroke();
                    }
                } else {
                    ctx.beginPath();
                    const sliceWidth = w / bufferLength;
                    let x = 0;
                    for (let i = 0; i < bufferLength; i++) {
                        const v = dataArray[i] / 128.0;
                        const y = v * h / 2;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                        x += sliceWidth;
                    }
                    ctx.stroke();
                }
            }
        }

        toggleBtn.onclick = async () => {
            if (!audioCtx) {
                await initAudio();
                updateEngine();
            }
            
            if (isPlaying) {
                audioCtx.suspend();
                toggleBtn.textContent = "Start";
                statusLabel.textContent = "Paused";
                statusLabel.className = "text-yellow-500";
            } else {
                audioCtx.resume();
                updateEngine();
                toggleBtn.textContent = "Stop";
                statusLabel.textContent = "Playing";
                statusLabel.className = "text-[#00ff41]";
            }
            isPlaying = !isPlaying;
        };

        resetBtn.onclick = () => {
            if (workletNode) workletNode.port.postMessage({ type: 'reset' });
        };

        formulaInput.oninput = updateEngine;
        modeSelect.onchange = updateEngine;
        sampleRateSelect.onchange = updateEngine;
        vizModeSelect.onchange = () => {
            document.getElementById('vizModeLabel').textContent = vizModeSelect.options[vizModeSelect.selectedIndex].text;
        };
        
        volumeInput.oninput = (e) => {
            if (gainNode) gainNode.gain.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.01);
        };

        PRESETS.forEach(p => {
            const el = document.createElement('div');
            el.className = 'preset-card';
            el.innerHTML = `<div class="text-[#00ff41] font-bold text-[10px] uppercase">${p.name}</div><div class="text-[9px] opacity-40 truncate font-mono">${p.code}</div>`;
            el.onclick = () => {
                formulaInput.value = p.code;
                updateEngine();
                if (!isPlaying) toggleBtn.click();
            };
            presetList.appendChild(el);
        });

        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.onresize = resize;
        resize();
        draw();
    </script>
</body>
</html>
