<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Sound Clone</title>
</head>
<body style="background:black;color:white;font-family:sans-serif;text-align:center;">

<h2>🔊 Test</h2>

<button onclick="playFaz()">▶ Play Sound</button>

<script>
const ctx = new (window.AudioContext || window.webkitAudioContext)();

// два измеренных тона
const f1 = 4976;
const f2 = 4700;

function beep(freq, time, dur, gainVal) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "square"; // более цифровой звук
    osc.frequency.value = freq;

    gain.gain.setValueAtTime(gainVal, time);
    gain.gain.exponentialRampToValueAtTime(0.0001, time + dur);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start(time);
    osc.stop(time + dur);
}

function playFaz() {
    const t = ctx.currentTime;

    beep(f1, t, 0.06, 0.3);

    beep(f2, t + 0.07, 0.07, 0.25);
}
</script>

</body>
</html>
