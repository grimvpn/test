<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Metadata Cleaner</title>
    <!-- Подключаем мощную либу для PDF -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1e1e1e; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 450px; text-align: center; }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #00ff88; }
        #drop-zone { border: 2px dashed #444; padding: 40px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        #drop-zone:hover { border-color: #00ff88; background: #252525; }
        .status { margin-top: 1rem; font-size: 0.9rem; min-height: 1.2em; }
        #download-link { display: none; margin-top: 15px; background: #00ff88; color: #000; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .loader { display: none; border: 3px solid #333; border-top: 3px solid #00ff88; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Metadata Stripper Pro</h1>
    <div id="drop-zone">Нажми или перетащи файл (PDF, JPG, PNG)</div>
    <input type="file" id="file-input" style="display: none;">
    
    <div class="loader" id="loader"></div>
    <div class="status" id="status">Готов к работе</div>
    <a id="download-link">Скачать чистый файл</a>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const status = document.getElementById('status');
    const dlLink = document.getElementById('download-link');
    const loader = document.getElementById('loader');

    dropZone.onclick = () => fileInput.click();

    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    async function handleFile(file) {
        if (!file) return;
        
        status.innerText = "Обработка...";
        status.style.color = "#00ff88";
        loader.style.display = "block";
        dlLink.style.display = "none";

        try {
            if (file.type === "application/pdf") {
                await cleanPDF(file);
            } else if (file.type.startsWith("image/")) {
                await cleanImage(file);
            } else {
                throw new Error("Формат не поддерживается");
            }
        } catch (err) {
            status.innerText = "Ошибка: " + err.message;
            status.style.color = "#ff4444";
        } finally {
            loader.style.display = "none";
        }
    }

    // ГЛУБОКАЯ ОЧИСТКА PDF
    async function cleanPDF(file) {
        const arrayBuffer = await file.arrayBuffer();
        // Загружаем PDF с игнорированием ошибок структуры
        const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer, { ignoreEncryption: true });
        
        // Удаляем стандартные метаданные
        pdfDoc.setTitle('');
        pdfDoc.setAuthor('');
        pdfDoc.setSubject('');
        pdfDoc.setCreator('');
        pdfDoc.setKeywords([]);
        pdfDoc.setProducer('');
        pdfDoc.setCreationDate(new Date(0));
        pdfDoc.setModificationDate(new Date(0));

        // Удаляем XMP метаданные (те самые скрытые XML блоки)
        const entries = pdfDoc.context.enumerateIndirectObjects();
        entries.forEach(([ref, obj]) => {
            if (obj instanceof PDFLib.PDFStream) {
                const metadata = obj.dict.get(PDFLib.PDFName.of('Type'));
                if (metadata === PDFLib.PDFName.of('Metadata')) {
                    pdfDoc.context.delete(ref);
                }
            }
        });

        const pdfBytes = await pdfDoc.save();
        triggerDownload(new Blob([pdfBytes], { type: 'application/pdf' }), "clean_" + file.name);
    }

    // ГЛУБОКАЯ ОЧИСТКА КАРТИНОК (Через Canvas)
    async function cleanImage(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    // Рисуем изображение на холст. EXIF при этом не переносится.
                    ctx.drawImage(img, 0, 0);
                    
                    canvas.toBlob((blob) => {
                        triggerDownload(blob, "clean_" + file.name);
                        resolve();
                    }, file.type, 0.9);
                };
                img.onerror = () => reject(new Error("Не удалось прочитать изображение"));
            };
        });
    }

    function triggerDownload(blob, name) {
        const url = URL.createObjectURL(blob);
        dlLink.href = url;
        dlLink.download = name;
        dlLink.style.display = "inline-block";
        status.innerText = "Готово! Метаданные стерты.";
    }
</script>

</body>
</html>
