<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Exif Tool (Local)</title>
    <!-- Библиотеки -->
    <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/piexifjs/1.0.6/piexif.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        :root { --accent: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { background: var(--card); padding: 2rem; border-radius: 15px; text-align: center; border: 1px solid #334155; margin-bottom: 20px; }
        .drop-zone { border: 2px dashed var(--accent); padding: 40px; text-align: center; border-radius: 12px; cursor: pointer; transition: 0.3s; background: #1e293b55; }
        .drop-zone:hover { background: #6366f111; }
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .viewer-panel, .edit-panel { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #334155; }
        th { color: var(--accent); text-transform: uppercase; font-size: 0.75rem; }
        input { background: #0f172a; border: 1px solid #475569; color: white; padding: 5px; width: 100%; border-radius: 4px; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .status-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-top: 10px; background: #334155; }
        #preview { width: 100%; border-radius: 8px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Профессиональный Менеджер Метаданных</h1>
        <p>PNG • WebP • TIFF • JPEG • PDF • DOCX • XLSX • PPTX</p>
        <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
            Нажмите или перетащите файл сюда
            <input type="file" id="fileInput" hidden>
        </div>
        <div id="fileInfo" class="status-tag">Файл не выбран</div>
    </div>

    <div class="grid">
        <div class="viewer-panel">
            <h3>Предпросмотр</h3>
            <img id="preview">
            <div id="quickStats"></div>
        </div>
        
        <div class="edit-panel">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>Метаданные (Все разделы)</h3>
                <button id="saveBtn" class="btn" style="display: none;">💾 Сохранить изменения</button>
            </div>
            <div id="metaContent">Загрузите файл для анализа...</div>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
const metaContent = document.getElementById('metaContent');
const saveBtn = document.getElementById('saveBtn');
const preview = document.getElementById('preview');

let currentFile = null;
let fileExt = '';

fileInput.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    currentFile = file;
    fileExt = file.name.split('.').pop().toLowerCase();
    
    document.getElementById('fileInfo').textContent = `Файл: ${file.name} (${(file.size/1024).toFixed(1)} KB)`;
    
    // Очистка предыдущего состояния
    metaContent.innerHTML = "🔍 Глубокое сканирование файла...";
    saveBtn.style.display = 'none';
    preview.style.display = 'none';

    try {
        // 1. Показываем превью, если это изображение
        if (file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = (event) => {
                preview.src = event.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        // 2. Универсальный парсинг метаданных
        // Мы используем exifr.parse(file), который сам решает, как читать файл
        const data = await exifr.parse(file, {
            pick: true, // Позволяет извлекать всё доступное
            xmp: true,
            icc: true,
            iptc: true,
            jfif: true,
            ihdr: true,
            tiff: true,
            gps: true,
            mergeOutput: false
        });

        if (data) {
            renderMetadata(data);
        } else {
            // Если exifr вернул null, возможно это Office или PDF без XMP
            if (['docx', 'xlsx', 'pptx'].includes(fileExt)) {
                handleOffice(file);
            } else if (fileExt === 'pdf') {
                metaContent.innerHTML = "Это PDF файл. Глубокие метаданные XMP не найдены. Попробуйте другой файл.";
            } else {
                metaContent.innerHTML = "⚠️ Метаданные не найдены или формат не поддерживается для чтения.";
            }
        }

        // Кнопка сохранения для поддерживаемых типов
        if (['jpg', 'jpeg', 'docx', 'xlsx', 'pptx'].includes(fileExt)) {
            saveBtn.style.display = 'block';
        }

    } catch (err) {
        console.error("Критическая ошибка:", err);
        metaContent.innerHTML = `<div style="color:#ef4444; border: 1px solid #ef4444; padding: 10px; border-radius: 5px;">
            <strong>Ошибка чтения:</strong> ${err.message}<br>
            <small>Попробуйте обновить страницу или загрузить другой файл.</small>
        </div>`;
    }
};

function renderMetadata(data) {
    let html = '';
    // Проходим по всем найденным секциям (Exif, GPS, XMP и т.д.)
    for (const [section, tags] of Object.entries(data)) {
        if (!tags || typeof tags !== 'object') continue;
        
        const keys = Object.keys(tags);
        if (keys.length === 0) continue;

        html += `<details open style="margin-bottom: 15px; border: 1px solid #334155; border-radius: 8px; overflow: hidden;">
            <summary style="cursor:pointer; background:#334155; padding: 10px; color:white; font-weight:bold;">
                📂 Секция: ${section.toUpperCase()} (${keys.length} тегов)
            </summary>
            <table style="width:100%; background: #1e293b;">`;
        
        for (const [key, val] of Object.entries(tags)) {
            let displayVal = val;
            
            // Обработка сложных типов данных (даты, объекты, массивы)
            if (val instanceof Date) {
                displayVal = val.toLocaleString();
            } else if (val instanceof Uint8Array) {
                displayVal = `Binary Data (${val.length} bytes)`;
            } else if (typeof val === 'object' && val !== null) {
                displayVal = JSON.stringify(val);
            }

            html += `<tr>
                <td style="color:#94a3b8; width:30%; border-bottom: 1px solid #0f172a; padding: 8px;">${key}</td>
                <td style="border-bottom: 1px solid #0f172a; padding: 8px;">
                    <input type="text" value="${displayVal}" style="background:transparent; border:none; color:#f1f5f9; outline:none; width:100%;">
                </td>
            </tr>`;
        }
        html += `</table></details>`;
    }
    metaContent.innerHTML = html || "В файле нет распознаваемых метаданных.";
}

    // Обработка Office (упрощенная для примера из предыдущего шага)
    async function handleOffice(file) {
        const arrayBuffer = await file.arrayBuffer();
        const zip = await JSZip.loadAsync(arrayBuffer);
        const coreXml = await zip.file("docProps/core.xml").async("string");
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(coreXml, "text/xml");
        
        let html = '<h3>Office Core Properties</h3><table>';
        const tags = xmlDoc.documentElement.children;
        for (let tag of tags) {
            html += `<tr><td>${tag.tagName}</td><td><input type="text" value="${tag.textContent}"></td></tr>`;
        }
        html += '</table>';
        metaContent.innerHTML = html;
        saveBtn.style.display = 'block';
    }

    // Сохранение (JPEG через piexif)
    saveBtn.onclick = async () => {
        if (['jpg', 'jpeg'].includes(fileExt)) {
            const reader = new FileReader();
            reader.onload = function() {
                const cleaned = piexif.remove(reader.result);
                // В реальном инструменте тут была бы сборка новых тегов
                // Для надежности сейчас предлагаем "Очищенную версию"
                download(cleaned, "processed_" + currentFile.name);
            };
            reader.readAsDataURL(currentFile);
        } else {
            alert("Для данного формата поддерживается глубокий просмотр. Функция сохранения в разработке.");
        }
    };

    function download(url, name) {
        const a = document.createElement('a');
        a.href = url;
        a.download = name;
        a.click();
    }
</script>

</body>
</html>
