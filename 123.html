<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Ray Metadata Engine</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/piexifjs@1.0.6/piexif.min.js"></script>
    <style>
        :root { --green: #00ff88; --red: #ff4444; --bg: #0a0a0a; --panel: #161616; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: #ccc; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: var(--panel); border: 1px solid #333; border-radius: 8px; width: 100%; max-width: 800px; padding: 20px; box-shadow: 0 0 20px rgba(0,255,136,0.1); }
        h1 { color: var(--green); text-align: center; text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem; }
        
        #drop-zone { border: 2px dashed #444; padding: 40px; text-align: center; transition: 0.3s; cursor: pointer; margin-bottom: 20px; }
        #drop-zone:hover { border-color: var(--green); background: #1a1a1a; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .editor-box, .vision-box { background: #000; border: 1px solid #222; padding: 15px; border-radius: 5px; }
        
        input { width: 100%; background: #111; border: 1px solid #444; color: var(--green); padding: 8px; margin: 5px 0 15px 0; box-sizing: border-box; outline: none; }
        label { font-size: 0.7rem; text-transform: uppercase; color: #666; }
        
        #hex-view { font-size: 0.65rem; color: #444; overflow-y: auto; height: 200px; word-break: break-all; border-top: 1px solid #222; padding-top: 10px; }
        .btn { width: 100%; padding: 12px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; transition: 0.2s; }
        .btn-main { background: var(--green); color: #000; }
        .btn-danger { background: transparent; border: 1px solid var(--red); color: var(--red); }
        .btn:hover { opacity: 0.8; transform: scale(0.98); }
        
        .status { margin-top: 15px; font-size: 0.8rem; border-left: 3px solid var(--green); padding-left: 10px; min-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>X-Ray Metadata Engine</h1>
    <div id="drop-zone">ОБНАРУЖЕНИЕ ФАЙЛА: ПЕРЕТАЩИТЕ СЮДА</div>
    <input type="file" id="file-input" style="display:none">

    <div class="grid">
        <div class="editor-box">
            <label>Title / Заголовок</label>
            <input type="text" id="m-title" placeholder="Пусто">
            <label>Author / Создатель</label>
            <input type="text" id="m-author" placeholder="Пусто">
            <label>Producer / Софт</label>
            <input type="text" id="m-producer" placeholder="Пусто">
            
            <button class="btn btn-main" onclick="process(false)">Записать данные</button>
            <button class="btn btn-danger" onclick="process(true)">Стереть в ноль</button>
        </div>
        
        <div class="vision-box">
            <div style="font-size: 0.7rem; color: var(--green); margin-bottom: 10px;">► СЫРЫЕ ДАННЫЕ (HEX-VISION)</div>
            <div id="hex-view">Ожидание файла...</div>
        </div>
    </div>
    
    <div id="status" class="status">Система готова.</div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const status = document.getElementById('status');
    const hexView = document.getElementById('hex-view');
    let activeFile = null;

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => load(e.target.files[0]);

    async function load(file) {
        if (!file) return;
        activeFile = file;
        status.innerText = `Файл обнаружен: ${file.name} (${file.size} bytes)`;
        
        // Визуализируем HEX для "зрения"
        const buffer = await file.arrayBuffer();
        const view = new Uint8Array(buffer.slice(0, 1000));
        hexView.innerText = Array.from(view).map(b => b.toString(16).padStart(2, '0')).join(' ');

        if (file.type === "application/pdf") {
            await analyzePDF(buffer);
        } else {
            status.innerText += " | Формат изображения готов к пересборке.";
        }
    }

    async function analyzePDF(buffer) {
        try {
            const pdfDoc = await PDFLib.PDFDocument.load(buffer, { ignoreEncryption: true });
            document.getElementById('m-title').value = pdfDoc.getTitle() || "";
            document.getElementById('m-author').value = pdfDoc.getAuthor() || "";
            document.getElementById('m-producer').value = pdfDoc.getProducer() || "";
            status.innerText = "PDF просканирован. Защита проигнорирована.";
        } catch (e) {
            status.innerText = "Критическая ошибка анализа. Используйте 'Стереть в ноль'.";
        }
    }

    async function process(stripAll) {
        if (!activeFile) return;
        status.innerText = "Запуск процесса...";

        try {
            if (activeFile.type === "application/pdf") {
                await runPDF(stripAll);
            } else if (activeFile.type.includes("jpeg") || activeFile.type.includes("jpg")) {
                await runJPEG(stripAll);
            } else {
                await runUniversal(activeFile);
            }
        } catch (e) {
            status.innerText = "ОШИБКА: " + e.message;
        }
    }

    async function runPDF(stripAll) {
        const buffer = await activeFile.arrayBuffer();
        const pdfDoc = await PDFLib.PDFDocument.load(buffer, { ignoreEncryption: true });
        
        const title = document.getElementById('m-title').value;
        const author = document.getElementById('m-author').value;
        const producer = document.getElementById('m-producer').value;

        pdfDoc.setTitle(stripAll ? "" : title);
        pdfDoc.setAuthor(stripAll ? "" : author);
        pdfDoc.setProducer(stripAll ? "" : producer);
        pdfDoc.setCreator(stripAll ? "" : "X-Ray Engine");

        // Глубокая зачистка: удаление объектов Metadata напрямую
        const indirectObjects = pdfDoc.context.enumerateIndirectObjects();
        indirectObjects.forEach(([ref, obj]) => {
            if (obj instanceof PDFLib.PDFStream) {
                const dict = obj.dict;
                if (dict.get(PDFLib.PDFName.of('Type')) === PDFLib.PDFName.of('Metadata')) {
                    pdfDoc.context.delete(ref);
                }
            }
        });

        // Пытаемся убить словарь шифрования, если он мешает
        pdfDoc.context.delete(PDFLib.PDFName.of('Encrypt'));

        const bytes = await pdfDoc.save();
        download(bytes, activeFile.name, "application/pdf");
    }

    async function runJPEG(stripAll) {
        const reader = new FileReader();
        reader.onload = function(e) {
            let data = e.target.result;
            if (stripAll) {
                data = piexif.remove(data);
            } else {
                const exif = {"0th":{}, "Exif":{}};
                exif["0th"][piexif.ImageIFD.ImageDescription] = document.getElementById('m-title').value;
                exif["0th"][piexif.ImageIFD.Artist] = document.getElementById('m-author').value;
                data = piexif.insert(piexif.dump(exif), data);
            }
            fetch(data).then(r => r.blob()).then(b => download(b, activeFile.name));
        };
        reader.readAsDataURL(activeFile);
    }

    async function runUniversal(file) {
        // Метод полной пересборки через Canvas (убивает любые метаданные)
        const img = new Image();
        img.src = URL.createObjectURL(file);
        await img.decode();
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        canvas.getContext('2d').drawImage(img, 0, 0);
        canvas.toBlob(blob => download(blob, file.name), file.type);
    }

    function download(data, name, type) {
        const blob = data instanceof Blob ? data : new Blob([data], { type: type });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "FIXED_" + name;
        a.click();
        status.innerText = "Файл успешно пересобран и выдан.";
    }
</script>
</body>
</html>
