<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Metadata Editor</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/piexifjs@1.0.6/piexif.min.js"></script>
    <style>
        :root { --accent: #00ff88; --bg: #0f0f0f; --card: #1a1a1a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; justify-content: center; padding: 20px; }
        .app-container { background: var(--card); border-radius: 15px; padding: 30px; width: 100%; max-width: 600px; box-shadow: 0 10px 50px rgba(0,0,0,0.7); border: 1px solid #333; }
        h1 { text-align: center; color: var(--accent); font-size: 1.8rem; margin-bottom: 25px; }
        #drop-area { border: 2px dashed #444; border-radius: 10px; padding: 40px; text-align: center; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        #drop-area:hover { border-color: var(--accent); background: #222; }
        .metadata-form { display: none; background: #252525; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; background: #111; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-save { background: var(--accent); color: #000; }
        .btn-clean { background: #ff4444; color: #fff; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        .status { text-align: center; margin-top: 15px; font-size: 0.9rem; color: var(--accent); }
    </style>
</head>
<body>

<div class="app-container">
    <h1>Metadata Engine Pro</h1>
    <div id="drop-area">Перетащите файл или нажмите для выбора (PDF, JPG, PNG)</div>
    <input type="file" id="file-selector" style="display:none">

    <div id="editor" class="metadata-form">
        <div class="input-group">
            <label>Название / Title</label>
            <input type="text" id="m-title">
        </div>
        <div class="input-group">
            <label>Автор / Author</label>
            <input type="text" id="m-author">
        </div>
        <div class="input-group">
            <label>Ключевые слова (через запятую)</label>
            <input type="text" id="m-keywords">
        </div>
        <div class="btn-group">
            <button class="btn-clean" onclick="processFile(true)">Удалить всё</button>
            <button class="btn-save" onclick="processFile(false)">Сохранить изменения</button>
        </div>
    </div>
    <div id="status" class="status"></div>
</div>

<script>
    const dropArea = document.getElementById('drop-area');
    const fileSelector = document.getElementById('file-selector');
    const editor = document.getElementById('editor');
    const status = document.getElementById('status');
    let currentFile = null;

    dropArea.onclick = () => fileSelector.click();
    fileSelector.onchange = (e) => loadFile(e.target.files[0]);

    // Загрузка и первичный анализ
    async function loadFile(file) {
        if (!file) return;
        currentFile = file;
        status.innerText = "Анализ структуры...";
        editor.style.display = "block";
        
        // Очистка полей перед загрузкой новых
        document.querySelectorAll('.metadata-form input').forEach(i => i.value = "");

        if (file.type === "application/pdf") {
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer, { ignoreEncryption: true });
                document.getElementById('m-title').value = pdfDoc.getTitle() || "";
                document.getElementById('m-author').value = pdfDoc.getAuthor() || "";
                document.getElementById('m-keywords').value = (pdfDoc.getKeywords() || "");
                status.innerText = "PDF загружен. Можно редактировать.";
            } catch (e) {
                status.innerText = "Ошибка доступа к PDF. Файл может быть поврежден.";
            }
        } else {
            status.innerText = "Изображение готово к обработке.";
        }
    }

    // Основной процесс (Сохранение или Очистка)
    async function processFile(stripAll) {
        if (!currentFile) return;
        status.innerText = "Обработка...";

        const meta = {
            title: stripAll ? "" : document.getElementById('m-title').value,
            author: stripAll ? "" : document.getElementById('m-author').value,
            keywords: stripAll ? "" : document.getElementById('m-keywords').value
        };

        try {
            if (currentFile.type === "application/pdf") {
                await handlePDF(meta, stripAll);
            } else if (currentFile.type === "image/jpeg" || currentFile.type === "image/jpg") {
                await handleJPEG(meta, stripAll);
            } else {
                await handleUniversalImage(stripAll);
            }
        } catch (e) {
            console.error(e);
            status.innerText = "Ошибка: " + e.message;
        }
    }

    async function handlePDF(meta, stripAll) {
        const arrayBuffer = await currentFile.arrayBuffer();
        const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer, { ignoreEncryption: true });
        
        pdfDoc.setTitle(meta.title);
        pdfDoc.setAuthor(meta.author);
        pdfDoc.setKeywords(meta.keywords.split(','));
        pdfDoc.setProducer(stripAll ? "" : "Pro Metadata Engine");
        pdfDoc.setCreator(stripAll ? "" : "Universal Tools");

        if (stripAll) {
            // Удаление скрытых XMP метаданных через низкоуровневый доступ
            const refs = pdfDoc.context.enumerateIndirectObjects();
            refs.forEach(([ref, obj]) => {
                if (obj instanceof PDFLib.PDFStream && obj.dict.get(PDFLib.PDFName.of('Type')) === PDFLib.PDFName.of('Metadata')) {
                    pdfDoc.context.delete(ref);
                }
            });
        }

        const bytes = await pdfDoc.save();
        download(new Blob([bytes]), currentFile.name);
    }

    async function handleJPEG(meta, stripAll) {
        const reader = new FileReader();
        reader.onload = function(e) {
            let jpegData = e.target.result;
            if (stripAll) {
                jpegData = piexif.remove(jpegData);
            } else {
                const exifObj = {"0th":{}, "Exif":{}, "GPS":{}};
                exifObj["0th"][piexif.ImageIFD.Title] = meta.title;
                exifObj["0th"][piexif.ImageIFD.Author] = meta.author;
                const exifBytes = piexif.dump(exifObj);
                jpegData = piexif.insert(exifBytes, jpegData);
            }
            fetch(jpegData).then(res => res.blob()).then(blob => download(blob, currentFile.name));
        };
        reader.readAsDataURL(currentFile);
    }

    async function handleUniversalImage(stripAll) {
        // Метод перерисовки для PNG/WebP (гарантирует очистку)
        const img = new Image();
        img.src = URL.createObjectURL(currentFile);
        await img.decode();
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        canvas.getContext('2d').drawImage(img, 0, 0);
        canvas.toBlob((blob) => download(blob, currentFile.name), currentFile.type);
    }

    function download(blob, name) {
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "PRO_" + name;
        link.click();
        status.innerText = "Файл успешно обработан и скачан!";
    }
</script>
</body>
</html>
