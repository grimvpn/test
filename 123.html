<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Meta Editor | Browser Native</title>
    
    <!-- Подключаем зависимости -->
    <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/piexifjs/1.0.6/piexif.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --danger: #f43f5e;
            --text: #f1f5f9;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1000px;
            width: 100%;
        }
        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 20px;
            border: 1px solid #334155;
            margin-bottom: 20px;
        }
        .drop-zone {
            border: 2px dashed #475569;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #1e293b;
        }
        .drop-zone:hover {
            border-color: var(--accent);
            background: #26334d;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-download { background: #10b981; color: white; }
        
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
            margin-top: 20px;
        }
        .panel {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            overflow: hidden;
        }
        #preview-img {
            max-width: 100%;
            border-radius: 8px;
            display: none;
        }
        .meta-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .meta-table tr { border-bottom: 1px solid #334155; }
        .meta-table td { padding: 10px 5px; }
        .tag-name { color: #94a3b8; width: 40%; font-weight: 500; }
        .tag-value input {
            background: transparent;
            border: 1px solid #475569;
            color: var(--accent);
            width: 100%;
            padding: 4px;
            border-radius: 4px;
        }
        .section-title {
            background: #334155;
            padding: 5px 10px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Exif & Meta Editor</h1>
        <p>Локальная обработка: JPEG, PNG, WebP, TIFF, PDF, DOCX, XLSX, PPTX</p>
        
        <div class="drop-zone" id="dropZone">
            <span id="dropText">Перетащите файл сюда или нажмите для выбора</span>
            <input type="file" id="fileInput" class="hidden" accept=".jpg,.jpeg,.png,.webp,.tiff,.pdf,.docx,.xlsx,.pptx">
        </div>

        <div class="controls">
            <button class="btn-danger" id="clearAllBtn" disabled>🗑 Удалить всё</button>
            <button class="btn-download" id="downloadBtn" disabled>💾 Скачать результат</button>
        </div>
    </div>

    <div class="main-grid">
        <div class="panel">
            <h3>Предпросмотр</h3>
            <div id="fileTypeInfo" style="margin-bottom: 10px; font-weight: bold; color: var(--accent);"></div>
            <img id="preview-img" src="" alt="Preview">
            <div id="pdf-placeholder" class="hidden" style="text-align: center; padding: 40px; background: #0f172a; border-radius: 8px;">📄 PDF Document</div>
        </div>

        <div class="panel" style="max-height: 70vh; overflow-y: auto;">
            <h3>Метаданные</h3>
            <div id="meta-container">Загрузите файл для просмотра...</div>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const metaContainer = document.getElementById('meta-container');
    const previewImg = document.getElementById('preview-img');
    const downloadBtn = document.getElementById('downloadBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const fileTypeInfo = document.getElementById('fileTypeInfo');

    let currentFile = null;
    let currentDataUrl = null;
    let officeZip = null;

    // Инициализация событий
    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    async function handleFile(file) {
        if (!file) return;
        currentFile = file;
        const ext = file.name.split('.').pop().toLowerCase();
        fileTypeInfo.textContent = `Тип: ${ext.toUpperCase()}`;
        
        // Сброс состояния
        metaContainer.innerHTML = "Анализ...";
        downloadBtn.disabled = true;
        clearAllBtn.disabled = false;
        previewImg.style.display = 'none';

        try {
            // 1. Попытка прочитать изображения через exifr
            if (['jpg', 'jpeg', 'png', 'webp', 'tiff'].includes(ext)) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                    currentDataUrl = e.target.result;
                };
                reader.readAsDataURL(file);

                const tags = await exifr.parse(file, { xmp: true, iptc: true, jfif: true, mergeOutput: false });
                renderMetadata(tags);
                downloadBtn.disabled = false;
            } 
            // 2. Обработка Office
            else if (['docx', 'xlsx', 'pptx'].includes(ext)) {
                handleOffice(file);
            }
            // 3. PDF (Просмотр базовых свойств)
            else if (ext === 'pdf') {
                metaContainer.innerHTML = "<p>PDF: Поддерживается только удаление метаданных через 'Очистку' в этой версии.</p>";
                downloadBtn.disabled = false;
            }
        } catch (err) {
            metaContainer.innerHTML = `<span style="color:red">Ошибка: ${err.message}</span>`;
        }
    }

    function renderMetadata(sections) {
        if (!sections) {
            metaContainer.innerHTML = "Метаданные не найдены.";
            return;
        }
        let html = '<table class="meta-table">';
        for (const [sectionName, tags] of Object.entries(sections)) {
            html += `<tr><td colspan="2" class="section-title">${sectionName}</td></tr>`;
            for (const [key, val] of Object.entries(tags)) {
                if (typeof val === 'object' && !(val instanceof Date)) continue;
                html += `<tr>
                    <td class="tag-name">${key}</td>
                    <td class="tag-value"><input type="text" value="${val}" data-section="${sectionName}" data-tag="${key}"></td>
                </tr>`;
            }
        }
        html += '</table>';
        metaContainer.innerHTML = html;
    }

    async function handleOffice(file) {
        const arrayBuffer = await file.arrayBuffer();
        officeZip = await JSZip.loadAsync(arrayBuffer);
        const coreXml = await officeZip.file("docProps/core.xml").async("text");
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(coreXml, "application/xml");
        
        let html = '<table class="meta-table"><tr><td colspan="2" class="section-title">Office Properties</td></tr>';
        const props = xmlDoc.documentElement.children;
        for (let prop of props) {
            html += `<tr>
                <td class="tag-name">${prop.tagName}</td>
                <td class="tag-value"><input type="text" value="${prop.textContent}" data-office="true" data-tag="${prop.tagName}"></td>
            </tr>`;
        }
        html += '</table>';
        metaContainer.innerHTML = html;
        downloadBtn.disabled = false;
    }

    // ЛОГИКА ОЧИСТКИ И СОХРАНЕНИЯ
    clearAllBtn.onclick = async () => {
        const ext = currentFile.name.split('.').pop().toLowerCase();
        
        if (['jpg', 'jpeg'].includes(ext)) {
            const cleaned = piexif.remove(currentDataUrl);
            download(cleaned, `clean_${currentFile.name}`);
        } 
        else if (['png', 'webp'].includes(ext)) {
            // Очистка через Canvas (убирает все метаданные, перерисовывая пиксели)
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = previewImg.naturalWidth;
            canvas.height = previewImg.naturalHeight;
            ctx.drawImage(previewImg, 0, 0);
            download(canvas.toDataURL(`image/${ext}`), `clean_${currentFile.name}`);
        }
        else if (['docx', 'xlsx', 'pptx'].includes(ext)) {
            // Простое удаление файла свойств из ZIP
            officeZip.remove("docProps/core.xml");
            const content = await officeZip.generateAsync({type: "blob"});
            download(URL.createObjectURL(content), `clean_${currentFile.name}`);
        }
        else {
            alert("Для данного формата поддерживается только просмотр или частичное редактирование.");
        }
    };

    downloadBtn.onclick = async () => {
        const ext = currentFile.name.split('.').pop().toLowerCase();
        if (['jpg', 'jpeg'].includes(ext)) {
            // Здесь можно добавить piexif.insert(piexif.dump(newData), currentDataUrl)
            // Но для GitHub Pages проще всего отдавать текущий файл, если не было правок
            download(currentDataUrl, `edited_${currentFile.name}`);
        } else {
            alert("Используйте 'Удалить всё' для получения чистого файла. Редактирование отдельных полей в разработке.");
        }
    };

    function download(url, name) {
        const a = document.createElement('a');
        a.href = url;
        a.download = name;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
</script>
</body>
</html>
