<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator | QR Names Password</title>
    <style>
        :root {
            --primary: #8e44ad;
            --primary-hover: #9b59b6;
            --secondary: #2c3e50;
            --success: #27ae60;
            --success-hover: #2ecc71;
            --bg: #f4f7f6;
            --text: #333;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 40px 20px; 
            display: flex; 
            justify-content: center;
        }

        .container { 
            background: #fff; 
            width: 100%; 
            max-width: 650px; 
            border-radius: 12px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
            overflow: hidden; 
        }

        /* Вкладки */
        .tabs { 
            display: flex; 
            background: var(--secondary); 
        }

        .tab-btn { 
            flex: 1; 
            padding: 16px; 
            border: none; 
            background: none; 
            color: #bdc3c7; 
            cursor: pointer; 
            font-size: 16px; 
            transition: all 0.3s ease; 
        }

        .tab-btn:hover { 
            background: #34495e; 
            color: #fff;
        }

        .tab-btn.active { 
            background: var(--primary); 
            color: #fff; 
            font-weight: bold; 
        }

        /* Контент вкладок */
        .tab-content { 
            padding: 30px; 
            display: none; 
            animation: fadeIn 0.4s ease-in-out;
        }

        .tab-content.active { 
            display: block; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { margin-top: 0; color: var(--secondary); }

        /* Формы */
        .form-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: bold; 
            color: #555;
        }

        input[type="text"], input[type="number"] { 
            width: 100%; 
            padding: 12px; 
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, input[type="number"]:focus {
            border-color: var(--primary);
            outline: none;
        }

        .checkbox-group { 
            display: flex; 
            align-items: center; 
            margin-bottom: 12px; 
        }

        .checkbox-group input { 
            margin-right: 10px; 
            width: 18px; 
            height: 18px; 
            cursor: pointer;
        }

        .checkbox-group label {
            margin-bottom: 0;
            font-weight: normal;
            cursor: pointer;
        }

        /* Сетка спецсимволов */
        .symbols-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 8px;
        }

        .symbols-header label { margin-bottom: 0; }
        
        .symbols-actions a {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
        }
        .symbols-actions a:hover { text-decoration: underline; }

        .symbols-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
            gap: 10px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        .symbol-item {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .symbol-item input { margin-right: 4px; cursor: pointer; }
        .symbol-item label { margin: 0; font-family: monospace; font-size: 16px; cursor: pointer; }

        /* Кнопки и результат */
        button.action-btn { 
            width: 100%; 
            padding: 14px; 
            background: var(--success); 
            color: #fff; 
            border: none; 
            border-radius: 6px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer; 
            transition: background 0.3s;
            margin-top: 10px;
        }

        button.action-btn:hover { 
            background: var(--success-hover); 
        }

        .result-box { 
            margin-top: 25px; 
            padding: 20px; 
            background: #ecf0f1; 
            border-radius: 6px; 
            text-align: center; 
            font-size: 24px; 
            font-weight: bold;
            letter-spacing: 1px;
            word-break: break-all; 
            border: 2px dashed #bdc3c7;
            display: none; /* Скрыто до генерации */
        }

        .qr-result { 
            text-align: center; 
            margin-top: 25px; 
            display: none; /* Скрыто до генерации */
            align-items: center;
            justify-content: center;
        }

        .qr-result img { 
            max-width: 100%; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('password-tab', this)">🔑 Пароли</button>
            <button class="tab-btn" onclick="openTab('names-tab', this)">🎮 Ники</button>
            <button class="tab-btn" onclick="openTab('qr-tab', this)">📱 QR-коды</button>
        </div>

        <!-- 1. Генератор паролей -->
        <div id="password-tab" class="tab-content active">
            <h2>Генератор надежных паролей</h2>
            <div class="form-group">
                <label>Длина пароля (4 - 128):</label>
                <input type="number" id="pass-length" value="16" min="4" max="128">
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="pass-upper" checked> 
                <label for="pass-upper">Заглавные буквы (A-Z)</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="pass-lower" checked> 
                <label for="pass-lower">Строчные буквы (a-z)</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="pass-numbers" checked> 
                <label for="pass-numbers">Цифры (0-9)</label>
            </div>

            <div class="form-group">
                <div class="symbols-header">
                    <label>Спецсимволы:</label>
                    <div class="symbols-actions">
                        <a href="#" onclick="toggleSymbols(true); return false;">Выбрать все</a> | 
                        <a href="#" onclick="toggleSymbols(false); return false;">Снять все</a>
                    </div>
                </div>
                <!-- Сетка символов будет сгенерирована через JS -->
                <div class="symbols-grid" id="symbols-container"></div>
            </div>

            <button class="action-btn" onclick="generatePassword()">Сгенерировать пароль</button>
            <div class="result-box" id="pass-result"></div>
        </div>

        <!-- 2. Процедурный Генератор Ников -->
        <div id="names-tab" class="tab-content">
            <h2>Процедурный генератор ников</h2>
            <p style="color: #666; font-size: 14px; margin-top: -10px; margin-bottom: 20px;">
                Генерирует уникальные английские слова по правилам построения слогов, а не берет из базы.
            </p>
            <div class="form-group">
                <label>Длина ника (букв):</label>
                <input type="number" id="nick-length" value="7" min="3" max="15">
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="nick-numbers"> 
                <label for="nick-numbers">Добавить случайные цифры в конец (напр. Name99)</label>
            </div>
            <button class="action-btn" onclick="generateNickname()">Сгенерировать ник</button>
            <div class="result-box" id="name-result"></div>
        </div>

        <!-- 3. Генератор QR-кодов -->
        <div id="qr-tab" class="tab-content">
            <h2>Создание QR-кода</h2>
            <div class="form-group">
                <label>Введите текст или ссылку URL:</label>
                <input type="text" id="qr-input" placeholder="Например: https://example.com">
            </div>
            <button class="action-btn" onclick="generateQR()">Создать QR-код</button>
            <div class="qr-result" id="qr-result"></div>
        </div>
    </div>

    <script>
        // --- Инициализация при загрузке страницы ---
        document.addEventListener("DOMContentLoaded", () => {
            // Создаем галочки для каждого спецсимвола
            const symbolsList = "!@#$%^&*()-_=+[]{};:'\",.<>/?\\|~`".split('');
            const container = document.getElementById('symbols-container');
            
            symbolsList.forEach((sym, index) => {
                const div = document.createElement('div');
                div.className = 'symbol-item';
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.value = sym;
                checkbox.id = 'sym-' + index;
                checkbox.checked = true; // Включены по умолчанию
                
                const label = document.createElement('label');
                label.htmlFor = 'sym-' + index;
                label.innerText = sym;
                
                div.appendChild(checkbox);
                div.appendChild(label);
                container.appendChild(div);
            });
        });

        // --- Логика переключения вкладок ---
        function openTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }

        // --- Функция для "Выбрать все / Снять все" символы ---
        function toggleSymbols(state) {
            const checkboxes = document.querySelectorAll('#symbols-container input[type="checkbox"]');
            checkboxes.forEach(cb => cb.checked = state);
        }

        // --- Логика генератора паролей ---
        function generatePassword() {
            const length = parseInt(document.getElementById('pass-length').value);
            const hasUpper = document.getElementById('pass-upper').checked;
            const hasLower = document.getElementById('pass-lower').checked;
            const hasNumbers = document.getElementById('pass-numbers').checked;

            let charPool = "";
            if (hasUpper) charPool += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            if (hasLower) charPool += "abcdefghijklmnopqrstuvwxyz";
            if (hasNumbers) charPool += "0123456789";

            // Собираем отмеченные индивидуальные символы
            const activeSymbols = document.querySelectorAll('#symbols-container input[type="checkbox"]:checked');
            activeSymbols.forEach(cb => {
                charPool += cb.value;
            });

            const resultBox = document.getElementById('pass-result');
            resultBox.style.display = 'block'; // Показываем блок

            if (charPool === "" || length < 1) {
                resultBox.innerText = "Выберите параметры генерации!";
                resultBox.style.color = "red";
                return;
            }
            
            resultBox.style.color = "var(--text)";
            let password = "";
            
            // Защита от криптографически слабых рандомов
            const randomValues = new Uint32Array(length);
            window.crypto.getRandomValues(randomValues);

            for (let i = 0; i < length; i++) {
                password += charPool[randomValues[i] % charPool.length];
            }
            
            resultBox.innerText = password;
        }

        // --- ПРОЦЕДУРНАЯ Логика генератора ников (на английском) ---
        function generateNickname() {
            const length = parseInt(document.getElementById('nick-length').value);
            const useNumbers = document.getElementById('nick-numbers').checked;
            const resultBox = document.getElementById('name-result');
            
            if (length < 3) {
                resultBox.innerText = "Слишком короткий ник";
                resultBox.style.display = 'block';
                return;
            }

            // Блоки для слогов: гласные и согласные (включая популярные сочетания из английского)
            const vowels = ["a", "e", "i", "o", "u", "y", "ae", "ea", "oo", "ou", "ai", "ee"];
            const consonants = ["b", "c", "d", "f", "g", "h", "j", "k", "l", "m", "n", "p", "r", "s", "t", "v", "w", "x", "z", "th", "sh", "ch", "kr", "dr", "tr", "gr", "st", "sp", "bl", "cl", "fl", "gl", "pl", "sl", "br", "cr", "fr", "pr"];
            
            let nickname = "";
            // Случайно решаем, с чего начать ник: с гласной или согласной
            let isVowel = Math.random() > 0.5;

            // Строим ник, чередуя гласные и согласные
            while (nickname.length < length) {
                let chunk = "";
                if (isVowel) {
                    chunk = vowels[Math.floor(Math.random() * vowels.length)];
                } else {
                    chunk = consonants[Math.floor(Math.random() * consonants.length)];
                }
                
                nickname += chunk;
                isVowel = !isVowel; // Смена типа для следующей итерации
            }
            
            // Обрезаем, если длина превысила нужную из-за двойных буквосочетаний
            nickname = nickname.slice(0, length);
            
            // Делаем первую букву заглавной
            nickname = nickname.charAt(0).toUpperCase() + nickname.slice(1);

            // Добавляем цифры в конец, если выбрано
            if (useNumbers) {
                const numLen = Math.floor(Math.random() * 3) + 2; // от 2 до 4 цифр
                let numStr = "";
                for(let i = 0; i < numLen; i++) {
                    numStr += Math.floor(Math.random() * 10);
                }
                nickname += numStr;
            }

            resultBox.innerText = nickname;
            resultBox.style.display = 'block';
        }

        // --- Логика генератора QR-кодов ---
        function generateQR() {
            const input = document.getElementById('qr-input').value.trim();
            const resultBox = document.getElementById('qr-result');
            
            if (!input) {
                resultBox.style.display = 'block';
                resultBox.innerHTML = "<p style='color:red;'>Пожалуйста, введите текст или ссылку.</p>";
                return;
            }

            resultBox.style.display = 'flex';
            resultBox.innerHTML = "<p>Генерация...</p>";

            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(input)}&margin=10`;
            
            const img = new Image();
            img.onload = () => {
                resultBox.innerHTML = '';
                resultBox.appendChild(img);
            };
            img.src = qrUrl;
        }
    </script>
</body>
</html>
