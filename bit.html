<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bytebeat Studio</title>
<style>
body { background:#111; color:#0f0; font-family:monospace; text-align:center; }
textarea { width:80%; height:80px; background:#000; color:#0f0; }
button, select, input { margin:5px; padding:5px; }
canvas { background:#000; margin-top:10px; }
</style>
</head>
<body>

<h2>Bytebeat Studio</h2>

<select id="presets" onchange="loadPreset()">
<option value="">-- presets --</option>
<option>t+(t&t^t>>6)-t*(t>>9&(t%16?2:6)&t>>9)</option>
<option>t*(42&t>>10)</option>
<option>t*(t&16384?6:5)*(3+(3&t>>(t&2048?7:14)))>>(3&t>>9)|t>>2</option>
<option>t*(t&16384?6:5)*(3+(3&t>>(t&2048?7:14)))>>(3&t>>9)|t>>3</option>
<option>t*(t&16384?7:5)*(3+(3&t>>14))>>(3&t>>9)|t>>6</option>
<option>t*(t&16384?6:5)*(5-(3&t>>(t&4096?7:14)))>>(3&t>>9)|t>>3</option>
<option>t*((t&4096?6:16)+(1&t>>14))>>(3&t>>8)|t>>(t&4096?3:4)</option>
<option>t*((t&4096?t%65536<59392?7:t&7:16)+(1&t>>14))>>(3&-t>>(t&2048?2:10))|t>>(t&16384?t&4096?10:3:2)</option>
<option>t*(42&t>>10)%256*(1-t%2048/3000)</option>
<option>t&t>>8</option>
<option>t*((t>>12|t>>8)&63&t>>4)</option>
<option>10*(t>>6|t|t>>(t>>16))+(7&t>>11)</option>
<option>(t>>7|t|t>>6)*10+4*(t&t>>13|t>>6)</option>
<option>t*(3+(1^t>>10&5))*(5+(3&t>>14))>>(t>>8&3)</option>
<option>2*(t>>5&t)-(t>>5)+t*(t>>14&14)</option>
<option>5*t&t>>7|3*t&t>>10</option>
<option>((-t&4095)*(255&t*(t&t>>13))>>12)+(127&t*(234&t>>8&t>>3)>>(3&t>>14))</option>
<option>(~t>>2)*((127&t*(7&t>>10))<(245&t*(2+(5&t>>14))))</option>
<option>t%(t/(t>>9|t>>13))</option>
<option>(t&t>>12)*(t>>4|t>>8)</option>
<option>20*t*t*(t>>11)/7</option>
<option>t*t/(t>>12&t>>8)<<7</option>
<option>t>>4|t*t*(t>>6&8^8)*(t>>11^t/3>>12)/(7+(t>>10&t>>14&3))</option>
</select>

<br>

<textarea id="code">
((t*(5+(t>>11&3))&t>>7)|(t*(3+(t>>10&1))&t>>9))&63
</textarea>

<br>

<button onclick="start()">▶ Play</button>
<button onclick="stop()">⏹ Stop</button>

<br>

Mode:
<select id="mode">
<option value="byte">bytebeat</option>
<option value="float">floatbeat</option>
</select>

Volume:
<input type="range" id="volume" min="0" max="1" step="0.01" value="0.3">

<canvas id="scope" width="600" height="150"></canvas>

<script>
let ctx, node, t = 0, analyser, dataArray;

function loadPreset() {
    document.getElementById("code").value =
        document.getElementById("presets").value;
}

function start() {
    stop();

    ctx = new (window.AudioContext || window.webkitAudioContext)();
    const sampleRate = 8000;

    node = ctx.createScriptProcessor(1024, 0, 1);
    analyser = ctx.createAnalyser();
    analyser.fftSize = 1024;

    const bufferLength = analyser.fftSize;
    dataArray = new Uint8Array(bufferLength);

    const code = document.getElementById("code").value;
    const func = new Function("t", "return " + code);

    node.onaudioprocess = function(e) {
        let out = e.outputBuffer.getChannelData(0);
        let vol = parseFloat(document.getElementById("volume").value);
        let mode = document.getElementById("mode").value;

        for (let i = 0; i < out.length; i++) {
            let v = func(t++);

            if (mode === "byte") {
                out[i] = (((v & 255) / 128) - 1) * vol;
            } else {
                out[i] = (v % 1) * vol;
            }
        }
    };

    node.connect(analyser);
    analyser.connect(ctx.destination);

    draw();
}

function stop() {
    if (node) node.disconnect();
    if (ctx) ctx.close();
}

function draw() {
    requestAnimationFrame(draw);

    if (!analyser) return;

    analyser.getByteTimeDomainData(dataArray);

    let canvas = document.getElementById("scope");
    let c = canvas.getContext("2d");

    c.fillStyle = "#000";
    c.fillRect(0, 0, canvas.width, canvas.height);

    c.strokeStyle = "#0f0";
    c.beginPath();

    let slice = canvas.width / dataArray.length;

    for (let i = 0; i < dataArray.length; i++) {
        let v = dataArray[i] / 128.0;
        let y = v * canvas.height / 2;

        if (i === 0) c.moveTo(0, y);
        else c.lineTo(i * slice, y);
    }

    c.stroke();
}
</script>

</body>
</html>
